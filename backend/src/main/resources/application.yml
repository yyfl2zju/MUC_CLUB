server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: club-management
  
  # 激活的配置文件（启动时通过参数指定: --spring.profiles.active=prod）
  # profiles:
  #   active: prod

  # 多数据源配置
  datasource:
    # 主数据源配置 (club_master - 存储社团信息)
    master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/mucclub?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
      username: mucclub
      password: mucclub2025  # 开发环境密码，生产环境请在 application-prod.yml 中配置
      hikari:
        minimum-idle: 5
        maximum-pool-size: 20
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        pool-name: MasterPool

    # 动态社团数据源配置模板
    club:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url-prefix: jdbc:mysql://localhost:3306/
      url-suffix: ?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
      username: mucclub
      password: mucclub2025  # 开发环境密码，生产环境请在 application-prod.yml 中配置
      hikari:
        minimum-idle: 3
        maximum-pool-size: 10
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

# JWT配置
jwt:
  secret: club-management-secret-key-256-bit-random-string-for-jwt-token-generation
  expiration: 86400000  # 24小时，单位毫秒

# 文件上传配置
file:
  upload:
    path: uploads  # 文件上传路径（相对于项目根目录，生产环境建议使用绝对路径）
    max-file-size: 100MB  # 单个文件最大大小
    max-request-size: 200MB  # 整个请求最大大小

# 日志配置
logging:
  level:
    com.club.management: debug
    org.springframework.security: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

